# ─── Kitty config — dotfiles-agentic ───────

# Apariencia
font_family      JetBrainsMono Nerd Font
font_size        12.0
adjust_line_height  125%
cursor_shape     beam
cursor_beam_thickness 1.5
background       #1e1e2e
foreground       #cdd6f4
selection_background #45475a
url_color        #89b4fa

# Rendimiento
repaint_delay    5
input_delay      1
sync_to_monitor  no

# Scrollback
scrollback_lines 100000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +F

# Atajos
map ctrl+shift+up    resize_window  height +2
map ctrl+shift+down  resize_window  height -2
map ctrl+shift+left  resize_window  width -2
map ctrl+shift+right resize_window  width +2

map ctrl+t           new_tab_with_cwd
map ctrl+shift+t     new_window

# Clipboard
map ctrl+shift+c     copy_to_buffer
map ctrl+shift+v     paste_from_buffer
copy_on_select yes
